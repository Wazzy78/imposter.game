<!doctype html>
<html lang="uz">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Imposter Word Game - Pro</title>
  <style>
    :root { font-family: system-ui, -apple-system, sans-serif; }
    body { margin: 0; background: #0b1020; color: #e8ecff; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); border-radius: 20px; padding: 24px; width: 90%; max-width: 500px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); backdrop-filter: blur(10px); }
    h1 { margin: 0 0 10px; font-size: 24px; text-align: center; color: #fff; }
    p { font-size: 14px; text-align: center; opacity: 0.7; margin-bottom: 20px; }
    
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 15px; }
    label { display: block; font-size: 12px; margin-bottom: 6px; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px; }
    input, select, textarea { width: 100%; box-sizing: border-box; padding: 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.2); color: #fff; font-size: 16px; outline: none; }
    
    .settings-toggle { color: #3b82f6; font-size: 13px; cursor: pointer; text-decoration: underline; margin-bottom: 10px; display: inline-block; }
    .hidden { display: none !important; }
    
    button { width: 100%; padding: 14px; border-radius: 12px; border: none; cursor: pointer; font-weight: 700; font-size: 16px; transition: 0.3s; margin-top: 10px; }
    .btn-primary { background: #3b82f6; color: white; }
    .btn-primary:hover { background: #2563eb; transform: translateY(-2px); }
    .btn-secondary { background: rgba(255,255,255,0.1); color: white; }

    .big-display { background: rgba(0,0,0,0.3); border: 2px dashed rgba(255,255,255,0.15); border-radius: 16px; padding: 40px 20px; text-align: center; margin: 20px 0; }
    .role-name { font-size: 32px; font-weight: 800; color: #fff; min-height: 40px; }
    .status-msg { font-size: 14px; color: #94a3b8; margin-top: 10px; }
    
    .player-nav { display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 15px; font-weight: bold; }
  </style>
</head>
<body>

<div class="card">
  <h1>Imposter Game</h1>
  <p>So'zni toping, lekin Imposterga bildirmang!</p>

  <div id="setup">
    <div class="row">
      <div>
        <label>O‘yinchilar</label>
        <input id="pCount" type="number" value="6" min="3">
      </div>
      <div>
        <label>Imposterlar</label>
        <select id="iCount">
          <option value="1">1 ta</option>
          <option value="2">2 ta</option>
        </select>
      </div>
    </div>

    <span class="settings-toggle" onclick="document.getElementById('wordBox').classList.toggle('hidden')">
      ⚙️ So‘zlar ro‘yxatini tahrirlash
    </span>
    <div id="wordBox" class="hidden">
      <textarea id="wordsInput" rows="5"></textarea>
    </div>

    <button class="btn-primary" onclick="startGame()">O‘yinni boshlash</button>
  </div>

  <div id="game" class="hidden">
    <div class="player-nav">
      O'yinchi: <span id="curP">1</span> / <span id="totalP">6</span>
    </div>

    <div class="big-display">
      <div id="roleText" class="role-name">???</div>
      <div id="roleHint" class="status-msg">Ko'rish uchun tugmani bosing</div>
    </div>

    <button id="mainBtn" class="btn-primary" onclick="handleFlow()">Ko‘rish</button>
    <button class="btn-secondary" onclick="resetGame()" style="margin-top: 20px; font-size: 12px; padding: 8px;">O'yinni tugatish</button>
  </div>
</div>

<script>
  // Medium va Professional darajadagi so'zlar
  const WORD_BANK = [
    "ignor", "ex", "green flag", "Telefon", "Statistika", "Kompyuter", "Toxic" , "Crush", "Merlin", "Sirk", "Sun’iy intellekt", "Metro", "Sehrgar", "Antarktida" , "Toy Story",  "Moana", 
    "Samsung", "Sun'iy intellekt", "Pick me", "Inflyatsiya", "Motivatsiya", "Iran" , "Dubay" , "yaponiya" , "Mototsikl" , "Cobalt" , "Gentra", "The Lion King", "Frozen",  "Shrek", "Minions",  "Joker" ,  "Twilight",  
    "Masha", "Situationship", "Osh", "manti", "avakado", "psixologiya", "Trump" , "Epstein Island" , "Harry Potter" , "Titanic", "Avatar", "Spider-Man", "Batman","Finding Nemo",
    "salbiy ustanovka", "instagram", "Shermuhammad aka" , " Farhod aka" , "Twitter", "Falsafa", "TikTok live", "Qaynona" , "Bloger" , "Hitler" ,  "Kung Fu Panda", "Home Alone",
    "Selfi", "Prezident", "Robot", "Cho‘l", "Mikroskop", "Kosmonavt", "Shokolad", "Lift", "Piramida", "Virus", "Gitara", "Akula", "Parashyut", "Dollar", "Antarktida",   "Aladdin"
  ];

  let state = { players: [], current: 0, showing: false };

  function init() {
    document.getElementById('wordsInput').value = WORD_BANK.join('\n');
  }

  function startGame() {
    const p = parseInt(document.getElementById('pCount').value);
    const i = parseInt(document.getElementById('iCount').value);
    const words = document.getElementById('wordsInput').value.split('\n').filter(w => w.trim());
    const secret = words[Math.floor(Math.random() * words.length)];

    state.players = Array(p).fill(secret);
    let impCount = 0;
    while(impCount < i) {
      let idx = Math.floor(Math.random() * p);
      if(state.players[idx] !== "IMPOSTER") {
        state.players[idx] = "IMPOSTER";
        impCount++;
      }
    }

    state.current = 0;
    state.showing = false;
    document.getElementById('setup').classList.add('hidden');
    document.getElementById('game').classList.remove('hidden');
    updateUI();
  }

  function handleFlow() {
    const btn = document.getElementById('mainBtn');
    if(!state.showing) {
      // Show role
      document.getElementById('roleText').textContent = state.players[state.current];
      document.getElementById('roleHint').textContent = "Yashirish uchun bosing";
      btn.textContent = "Yashirish";
      state.showing = true;
    } else {
      // Hide and move next
      if(state.current < state.players.length - 1) {
        state.current++;
        state.showing = false;
        updateUI();
      } else {
        document.getElementById('roleText').textContent = "Tayyor!";
        document.getElementById('roleHint').textContent = "Hamma ko'rib bo'ldi. O'yinni boshlang!";
        btn.classList.add('hidden');
      }
    }
  }

  function updateUI() {
    document.getElementById('curP').textContent = state.current + 1;
    document.getElementById('totalP').textContent = state.players.length;
    document.getElementById('roleText').textContent = "???";
    document.getElementById('roleHint').textContent = "Ko'rish uchun tugmani bosing";
    const btn = document.getElementById('mainBtn');
    btn.textContent = "Ko‘rish";
    btn.classList.remove('hidden');
  }

  function resetGame() {
    document.getElementById('setup').classList.remove('hidden');
    document.getElementById('game').classList.add('hidden');
  }

  init();
</script>
</body>
</html>
