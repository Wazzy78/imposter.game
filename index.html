<!doctype html>
<html lang="uz">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Imposter Word Game - Pro</title>
  <style>
    :root { font-family: system-ui, -apple-system, sans-serif; }
    body { margin: 0; background: #0b1020; color: #e8ecff; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); border-radius: 20px; padding: 24px; width: 90%; max-width: 500px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); backdrop-filter: blur(10px); }
    h1 { margin: 0 0 10px; font-size: 24px; text-align: center; color: #fff; }
    p { font-size: 14px; text-align: center; opacity: 0.7; margin-bottom: 20px; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 15px; }
    label { display: block; font-size: 12px; margin-bottom: 6px; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px; }
    input, select, textarea { width: 100%; box-sizing: border-box; padding: 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.2); color: #fff; font-size: 16px; outline: none; }
    .settings-toggle { color: #3b82f6; font-size: 13px; cursor: pointer; text-decoration: underline; margin-bottom: 10px; display: inline-block; }
    .hidden { display: none !important; }
    button { width: 100%; padding: 14px; border-radius: 12px; border: none; cursor: pointer; font-weight: 700; font-size: 16px; transition: 0.3s; margin-top: 10px; }
    .btn-primary { background: #3b82f6; color: white; }
    .btn-primary:hover { background: #2563eb; transform: translateY(-2px); }
    .btn-secondary { background: rgba(255,255,255,0.1); color: white; }
    .btn-next { background: #10b981; color: white; }
    .btn-next:hover { background: #059669; transform: translateY(-2px); }

    .big-display {
      border-radius: 16px; padding: 40px 20px; text-align: center; margin: 20px 0;
      transition: all 0.4s ease;
    }
    .card-hidden {
      background: rgba(0,0,0,0.3);
      border: 2px dashed rgba(255,255,255,0.15);
    }
    .card-shown {
      background: rgba(59,130,246,0.15);
      border: 2px solid rgba(59,130,246,0.5);
    }
    .card-imposter {
      background: rgba(239,68,68,0.15);
      border: 2px solid rgba(239,68,68,0.6);
    }
    .role-name { font-size: 32px; font-weight: 800; color: #fff; min-height: 40px; }
    .status-msg { font-size: 14px; color: #94a3b8; margin-top: 10px; }
    .player-nav { display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 15px; font-weight: bold; }
    .word-counter { font-size: 11px; color: #475569; text-align: center; margin-top: 6px; }
  </style>
</head>
<body>

<div class="card">
  <h1>Imposter Game</h1>
  <p>So'zni toping, lekin Imposterga bildirmang!</p>

  <!-- SETUP -->
  <div id="setup">
    <div class="row">
      <div>
        <label>O'yinchilar</label>
        <input id="pCount" type="number" value="6" min="3">
      </div>
      <div>
        <label>Imposterlar</label>
        <select id="iCount">
          <option value="1">1 ta</option>
          <option value="2">2 ta</option>
        </select>
      </div>
    </div>
    <span class="settings-toggle" onclick="document.getElementById('wordBox').classList.toggle('hidden')">
      ⚙️ So'zlar ro'yxatini tahrirlash
    </span>
    <div id="wordBox" class="hidden">
      <textarea id="wordsInput" rows="5"></textarea>
    </div>
    <button class="btn-primary" onclick="startGame()">O'yinni boshlash</button>
    <div class="word-counter" id="queueInfo"></div>
  </div>

  <!-- GAME -->
  <div id="game" class="hidden">
    <div class="player-nav">
      O'yinchi: <span id="curP">1</span> / <span id="totalP">6</span>
    </div>

    <div id="cardDisplay" class="big-display card-hidden">
      <div id="roleText" class="role-name">???</div>
      <div id="roleHint" class="status-msg">Ko'rish uchun tugmani bosing</div>
    </div>

    <!-- Step 1: Ko'rish -->
    <button id="btnShow" class="btn-primary" onclick="showRole()">👁 Ko'rish</button>

    <!-- Step 2: Yashirish (faqat karta ochiq paytida ko'rinadi) -->
    <button id="btnHide" class="btn-secondary hidden" onclick="hideRole()">🙈 Yashirish</button>

    <!-- Step 3: Next Player (faqat yashirilgandan keyin ko'rinadi) -->
    <button id="btnNext" class="btn-next hidden" onclick="nextPlayer()">➡️ Next Player</button>

    <button class="btn-secondary" onclick="resetGame()" style="margin-top: 20px; font-size: 12px; padding: 8px;">O'yinni tugatish</button>
  </div>
</div>

<script>
  const WORD_BANK = [
    "ignor", "ex", "green flag", "Telefon", "Statistika", "Kompyuter", "Sessiya", "Crush", "Merlin", "Sirk", "Sun'iy intellekt", "Metro", "Sehrgar", "Antarktida", "Toy Story", "Moana",
    "Samsung", "Pick me", "Inflyatsiya", "Motivatsiya", "Iran", "Dubay", "yaponiya", "Mototsikl", "Cobalt", "Gentra", "The Lion King", "Frozen", "Shrek", "Minions", "Joker", "Twilight",
    "Masha", "Apple", "Osh", "manti", "avakado", "psixologiya", "Trump", "Epstein Island", "Harry Potter", "Titanic", "Avatar", "Spider-Man", "Batman", "Finding Nemo",
    "Pleysteyshin", "instagram", "UZSWLU", "Matematika", "Twitter", "Falsafa", "TikTok", "Qaynona", "Bloger", "Hitler", "Kung Fu Panda", "Home Alone",
    "Selfi", "Prezident", "Robot", "Cho'l", "Mikroskop", "Kosmonavt", "Shokolad", "Lift", "Piramida", "Virus", "Gitara", "Akula", "Parashyut", "Dollar", "Aladdin", "CS2",
    "Netflix", "YouTube", "Google", "Tesla", "ChatGPT", "Startap", "Kriptovalyuta", "Bitcoin", "Blockchain", "Hacker", "Programmist", "Dasturchi", "Startup", "Influencer", "Podcast", "Mem",
    "Reels", "Stream", "Gamer", "PUBG", "Minecraft", "GTA", "Fortnite", "Marvel", "Deadpool", "Iron Man", "Hulk", "Doctor Strange", "Star Wars", "Jurassic Park", "Matrix", "Transformers",
    "Barbie", "Oppenheimer", "Wednesday", "Stranger Things", "Naruto", "Attack on Titan", "One Piece", "Demon Slayer", "Pokemon", "Disney", "Pixar", "Amazon", "Alibaba", "Dubai Mall", "Times Square",
    "Paris", "London", "New York", "Seul", "Tokyo", "Samuray", "Ninja", "Kimono", "Sushi", "Ramen", "Burger", "Pizza", "Hotdog", "Cappuccino", "Latte", "Espresso",
    "Fitness", "Yoga", "Meditatsiya", "Psixolog", "Tadbirkor", "Investor", "Marketing", "Reklama", "Brend", "Trend", "Challenge", "Vlog", "Hashtag", "Emoji", "Metaverse", "VR", "Robototexnika",
    "Nanotexnologiya", "Laboratoriya", "Astronomiya", "Galaktika", "Qora tuynuk", "Raketta", "Mars", "Saturn"
  ];

  let wordQueue = [];
  let lastUsedWord = null;
  let state = { players: [], current: 0 };

  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function buildQueue(words) {
    let q = shuffle(words);
    if (lastUsedWord && q[0] === lastUsedWord && q.length > 1) {
      const swapIdx = Math.floor(Math.random() * (q.length - 1)) + 1;
      [q[0], q[swapIdx]] = [q[swapIdx], q[0]];
    }
    return q;
  }

  function pickNextWord(words) {
    if (wordQueue.length === 0) wordQueue = buildQueue(words);
    const word = wordQueue.shift();
    lastUsedWord = word;
    return word;
  }

  function getWords() {
    return document.getElementById('wordsInput').value
      .split('\n').map(w => w.trim()).filter(Boolean)
      .filter((w, i, arr) => arr.indexOf(w) === i);
  }

  function init() {
    const unique = WORD_BANK.filter((w, i, arr) => arr.indexOf(w) === i);
    document.getElementById('wordsInput').value = unique.join('\n');
    document.getElementById('queueInfo').textContent = `Jami ${unique.length} ta so'z`;
  }

  function startGame() {
    const words = getWords();
    if (words.length < 2) { alert("Kamida 2 ta so'z kiriting!"); return; }

    const p = parseInt(document.getElementById('pCount').value);
    const iCount = parseInt(document.getElementById('iCount').value);
    const secret = pickNextWord(words);

    state.players = Array(p).fill(secret);
    let impAssigned = 0;
    while (impAssigned < iCount) {
      let idx = Math.floor(Math.random() * p);
      if (state.players[idx] !== "IMPOSTER") {
        state.players[idx] = "IMPOSTER";
        impAssigned++;
      }
    }

    state.current = 0;
    document.getElementById('setup').classList.add('hidden');
    document.getElementById('game').classList.remove('hidden');
    renderWaiting();
  }

  // State: waiting (card closed, only Show button visible)
  function renderWaiting() {
    document.getElementById('curP').textContent = state.current + 1;
    document.getElementById('totalP').textContent = state.players.length;

    const card = document.getElementById('cardDisplay');
    card.className = 'big-display card-hidden';
    document.getElementById('roleText').textContent = '???';
    document.getElementById('roleHint').textContent = 'Ko\'rish uchun tugmani bosing';

    document.getElementById('btnShow').classList.remove('hidden');
    document.getElementById('btnHide').classList.add('hidden');
    document.getElementById('btnNext').classList.add('hidden');
  }

  // Step 1: Show role
  function showRole() {
    const role = state.players[state.current];
    const isImposter = role === "IMPOSTER";

    const card = document.getElementById('cardDisplay');
    card.className = 'big-display ' + (isImposter ? 'card-imposter' : 'card-shown');

    document.getElementById('roleText').textContent = role;
    document.getElementById('roleHint').textContent = isImposter
      ? '🕵️ Siz Impostersiz! Hech kimga bildirmang!'
      : '✅ So\'zni eslab qoling!';

    document.getElementById('btnShow').classList.add('hidden');
    document.getElementById('btnHide').classList.remove('hidden');
    document.getElementById('btnNext').classList.add('hidden');
  }

  // Step 2: Hide role
  function hideRole() {
    const card = document.getElementById('cardDisplay');
    card.className = 'big-display card-hidden';
    document.getElementById('roleText').textContent = '???';
    document.getElementById('roleHint').textContent = 'Yashirildi ✓';

    document.getElementById('btnShow').classList.add('hidden');
    document.getElementById('btnHide').classList.add('hidden');
    document.getElementById('btnNext').classList.remove('hidden');
  }

  // Step 3: Next player
  function nextPlayer() {
    if (state.current < state.players.length - 1) {
      state.current++;
      renderWaiting();
    } else {
      // All players done
      const card = document.getElementById('cardDisplay');
      card.className = 'big-display card-shown';
      document.getElementById('roleText').textContent = '🎮 Tayyor!';
      document.getElementById('roleHint').textContent = 'Hamma ko\'rib bo\'ldi. O\'yinni boshlang!';
      document.getElementById('btnShow').classList.add('hidden');
      document.getElementById('btnHide').classList.add('hidden');
      document.getElementById('btnNext').classList.add('hidden');
      document.getElementById('curP').textContent = state.players.length;
    }
  }

  function resetGame() {
    document.getElementById('setup').classList.remove('hidden');
    document.getElementById('game').classList.add('hidden');
  }

  init();
</script>
</body>
</html>
