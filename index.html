<!doctype html>
<html lang="uz">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Imposter Word Game</title>
  <style>
    :root { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; }
    body { margin: 0; background: #0b1020; color: #e8ecff; min-height: 100vh; }
    .wrap { max-width: 860px; margin: 0 auto; padding: 18px; }
    .card { 
      background: rgba(255,255,255,0.06); 
      border: 1px solid rgba(255,255,255,0.12); 
      border-radius: 18px; 
      padding: 20px; 
      box-shadow: 0 12px 30px rgba(0,0,0,0.35); 
      backdrop-filter: blur(10px);
    }
    h1 { margin: 0 0 8px; font-size: 24px; color: #fff; text-align: center; }
    p { margin: 6px 0 16px; line-height: 1.5; color: rgba(232,236,255,0.7); text-align: center; }
    
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
    @media (max-width: 600px){ .row { grid-template-columns: 1fr; } }
    
    label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 6px; color: #94a3b8; }
    input, select, textarea {
      width: 100%; box-sizing: border-box; padding: 12px;
      border-radius: 12px; border: 1px solid rgba(255,255,255,0.15);
      background: rgba(0,0,0,0.3); color: #fff; font-size: 16px;
    }
    textarea { min-height: 120px; resize: vertical; }
    
    .btns { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 15px; }
    button {
      flex: 1; padding: 12px 18px; border-radius: 12px; border: none;
      cursor: pointer; font-weight: 700; transition: 0.2s; font-size: 15px;
    }
    #startBtn { background: #3b82f6; color: white; }
    #startBtn:hover { background: #2563eb; }
    #resetBtn { background: rgba(255,255,255,0.1); color: white; }
    
    .pill-box { display: flex; flex-wrap: wrap; gap: 8px; margin: 15px 0; }
    .pill {
      padding: 6px 12px; border-radius: 20px; font-size: 12px;
      background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1);
    }
    .pill.danger { border-color: #ef4444; color: #f87171; }
    .pill.ok { border-color: #10b981; color: #34d399; }

    .stage { margin-top: 20px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.1); }
    .player-indicator { text-align: center; margin-bottom: 15px; font-weight: bold; color: #60a5fa; }
    
    .big-card {
      background: linear-gradient(145deg, rgba(255,255,255,0.05), rgba(0,0,0,0.2));
      border-radius: 20px; border: 2px dashed rgba(255,255,255,0.2);
      padding: 40px 20px; text-align: center; min-height: 120px;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
    }
    .role { font-size: 32px; font-weight: 800; letter-spacing: 1px; color: #fff; }
    .hint { margin-top: 10px; font-size: 14px; color: #94a3b8; font-style: italic; }

    .list { display: grid; gap: 8px; margin-top: 15px; }
    .item { 
      display: flex; justify-content: space-between; padding: 12px; 
      border-radius: 10px; background: rgba(255,255,255,0.04); 
    }
    .hidden { display: none !important; }
  </style>
</head>
<body>

<div class="wrap">
  <div class="card">
    <h1>Imposter Word Game</h1>
    <p>O‘yinchilarga bir xil so‘z beriladi, Imposterga esa <b>IMPOSTER</b> chiqadi.</p>

    <div id="setupArea">
      <div class="row">
        <div>
          <label>O‘yinchi soni</label>
          <input id="players" type="number" min="3" max="30" value="6" />
        </div>
        <div>
          <label>Imposter soni</label>
          <select id="imposters">
            <option value="1">1 ta Imposter</option>
            <option value="2">2 ta Imposter</option>
            <option value="3">3 ta Imposter</option>
          </select>
        </div>
      </div>

      <label>So‘zlar ro‘yxati (har qatorga bitta)</label>
      <textarea id="words" placeholder="Har bir qatorga bittadan so'z yozing..."></textarea>
      
      <div class="pill-box">
        <div class="pill ok">✅ Navbat bilan ko‘rish</div>
        <div class="pill danger">⚠️ Maxfiylikni saqlang</div>
        <div class="pill">🕵️ Imposter: Bilmasligi kerak</div>
      </div>

      <div class="btns">
        <button id="startBtn">O‘yinni boshlash</button>
      </div>
    </div>

    <div id="stage" class="stage hidden">
      <div class="player-indicator">
        O‘yinchi: <span id="who">1</span> / <span id="total">6</span>
      </div>

      <div class="big-card">
        <div id="roleText" class="role">???</div>
        <div id="roleHint" class="hint">Ko'rish uchun tugmani bosing</div>
      </div>

      <div class="btns">
        <button id="showBtn" style="background:#10b981; color:white;">Ko‘rish</button>
        <button id="hideBtn" class="hidden" style="background:#64748b; color:white;">Yashirish</button>
        <button id="nextBtn" class="hidden" style="background:#3b82f6; color:white;">Keyingi o‘yinchi →</button>
      </div>
      
      <div class="btns" style="margin-top:20px;">
        <button id="revealBtn" style="background:transparent; border:1px solid #ef4444; color:#ef4444;">Hamma rollarni ochish</button>
        <button id="resetBtn">Reset</button>
      </div>

      <div id="revealArea" class="hidden">
        <div style="margin-top:20px; font-weight:bold; border-bottom:1px solid #333; padding-bottom:5px;">Natijalar:</div>
        <div class="list" id="revealList"></div>
      </div>
    </div>
  </div>
</div>

<script>
  const DEFAULT_WORDS = ["Dasturchi", "Kofe", "Kitob", "Bozor", "Mashina", "Internet", "Osh", "Pitsa", "Tog‘", "Telefon", "Samolyot", "Shifokor", "Futbol"];

  // Elements
  const setupArea = document.getElementById('setupArea');
  const stage = document.getElementById('stage');
  const wordsInput = document.getElementById('words');
  const roleText = document.getElementById('roleText');
  const roleHint = document.getElementById('roleHint');
  const revealList = document.getElementById('revealList');
  const revealArea = document.getElementById('revealArea');

  // Buttons
  const startBtn = document.getElementById('startBtn');
  const showBtn = document.getElementById('showBtn');
  const hideBtn = document.getElementById('hideBtn');
  const nextBtn = document.getElementById('nextBtn');
  const revealBtn = document.getElementById('revealBtn');
  const resetBtn = document.getElementById('resetBtn');

  let roles = [];
  let currentIndex = 0;

  function init() {
    wordsInput.value = DEFAULT_WORDS.join('\n');
  }

  startBtn.onclick = () => {
    const pCount = parseInt(document.getElementById('players').value);
    const iCount = parseInt(document.getElementById('imposters').value);
    
    if (iCount >= pCount - 1) {
      alert("Imposterlar soni o'yinchilardan kam bo'lishi kerak!");
      return;
    }

    const words = wordsInput.value.split('\n').filter(w => w.trim() !== '');
    const secretWord = words[Math.floor(Math.random() * words.length)];

    roles = Array(pCount).fill(secretWord);
    
    // Assign Imposters
    let assigned = 0;
    while (assigned < iCount) {
      let idx = Math.floor(Math.random() * pCount);
      if (roles[idx] !== "IMPOSTER") {
        roles[idx] = "IMPOSTER";
        assigned++;
      }
    }

    currentIndex = 0;
    updateStage();
    setupArea.classList.add('hidden');
    stage.classList.remove('hidden');
    revealArea.classList.add('hidden');
  };

  function updateStage() {
    document.getElementById('who').textContent = currentIndex + 1;
    document.getElementById('total').textContent = roles.length;
    roleText.textContent = "???";
    roleHint.textContent = "Telefonni o‘zingizga qaratib tugmani bosing";
    
    showBtn.classList.remove('hidden');
    hideBtn.classList.add('hidden');
    nextBtn.classList.add('hidden');
  }

  showBtn.onclick = () => {
    const currentRole = roles[currentIndex];
    roleText.textContent = currentRole;
    roleHint.textContent = currentRole === "IMPOSTER" ? "Siz ayg'oqchisiz! Bildirmang." : "Bu so'zni boshqalarga aytmang.";
    
    showBtn.classList.add('hidden');
    hideBtn.classList.remove('hidden');
  };

  hideBtn.onclick = () => {
    roleText.textContent = "---";
    roleHint.textContent = "Tayyor bo'lsangiz keyingisiga o'ting";
    hideBtn.classList.add('hidden');
    
    if (currentIndex < roles.length - 1) {
      nextBtn.classList.remove('hidden');
    } else {
      roleHint.textContent = "Hamma ko'rib bo'ldi. O'yinni boshlang!";
    }
  };

  nextBtn.onclick = () => {
    currentIndex++;
    updateStage();
  };

  revealBtn.onclick = () => {
    revealArea.classList.remove('hidden');
    revealList.innerHTML = roles.map((r, i) => `
      <div class="item">
        <span>O'yinchi ${i+1}</span>
        <b style="color:${r === 'IMPOSTER' ? '#f87171' : '#34d399'}">${r}</b>
      </div>
    `).join('');
  };

  resetBtn.onclick = () => {
    stage.classList.add('hidden');
    setupArea.classList.remove('hidden');
  };

  init();
</script>

</body>
</html>
